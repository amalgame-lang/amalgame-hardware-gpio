# Package manifest — amalgame-hardware-gpio
#
# Hardware peripheral access for Linux single-board computers
# (Raspberry Pi and friends). Phases 1–4 ship digital GPIO + edge
# events + I2C + SPI; PWM / UART land in later phases under the same
# Amalgame.Hardware namespace.
#
#   Gpio                       — flat, Mcu-style digital I/O
#     .UseChip(path)           — pick the gpiochip (default /dev/gpiochip0)
#     .PinMode(pin, mode)      — Input / Output / InputPullup / InputPulldown
#     .DigitalWrite(pin, lvl)  — Low / High
#     .DigitalRead(pin) → Level
#     .Toggle(pin)
#     .Release(pin) / .Close()
#     .Backend() → libgpiod version string
#     .WatchEdge(pin, edge)    — arm kernel edge detection (Phase 2)
#     .WaitEdge(timeoutMs) → GpioEvent      — block for next edge
#     .PollEdges() → List<GpioEvent>        — drain pending edges
#
#   PinMode    — Input / Output / InputPullup / InputPulldown
#   Level      — Low (0) / High (1)
#   Edge       — Rising / Falling / Both
#   GpioEvent  — { KindOf(): Edge, PinOf(): int, TimestampNsOf(): int, IsTimeout(): bool }
#
#   I2c                        — I2C master over /dev/i2c-<bus> (Phase 3)
#     new I2c(bus) / .IsOpen() / .Close()
#     .WriteByte/.ReadByte(addr[, value])
#     .WriteReg/.ReadReg(addr, reg[, value])
#     .WriteBytes(addr, List<int>) / .ReadBytes(addr, count) → List<int>
#     .Scan() → List<int>      — probe responders 0x03..0x77
#
#   Spi                        — SPI master over /dev/spidev<bus>.<cs> (Phase 4)
#     new Spi(bus, cs) / .IsOpen() / .Close()
#     .SetMode(0..3) / .SetSpeed(hz) / .SetBits(n)
#     .Transfer(List<int>) → List<int>   — full-duplex
#
# Backend: libgpiod v2 on the character device /dev/gpiochip* — the
# kernel-blessed userspace GPIO API, safe on Pi 1→5. The legacy
# /dev/gpiomem mmap is broken on the Pi 5 (RP1 chip) and sysfs
# /sys/class/gpio is deprecated; neither is used here.
#
# BUILD DEPENDENCY: libgpiod v2 (>= 2.0). Note that Raspberry Pi OS /
# Debian Bookworm and Ubuntu 24.04 LTS only ship libgpiod 1.6
# (incompatible API) — build 2.x from source there (see README).
# Debian Trixie+ and Ubuntu 24.10+ ship 2.x in apt.
#
# Installation:
#
#   amc package add hardware-gpio
#   amc package add github.com/amalgame-lang/amalgame-hardware-gpio@v0.4.0

[package]
name              = "amalgame-hardware-gpio"
version           = "0.4.0"
license           = "Apache-2.0"
description       = "GPIO (digital I/O + edge events), I2C and SPI for Linux SBCs (Raspberry Pi 1→5). GPIO via libgpiod v2; I2C/SPI via /dev/i2c-*//dev/spidev* ioctl. First of the Amalgame.Hardware family (PWM/UART to come)."
authors           = ["Bastien Mouget"]
required-amalgame = ">=0.8.47"
schema-version    = 1

[stdlib]
classes   = ["Gpio", "GpioEvent", "I2c", "Spi"]
header    = "facade-stub.h"
namespace = "Amalgame.Hardware"
facade    = "facade.am"
libs      = ["gpiod"]
